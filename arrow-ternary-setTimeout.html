<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>JS</title>
</head>
<body>
	<div id="getValue">aaa</div>
	<script type="text/javascript">
		let sum = (a, b)=> a + b;
		let big = document.getElementById('getValue').innerHTML = "big";
		let small = document.getElementById("getValue").innerHTML = "small";
		sum(3, 4) > 4 ? big() : small();
	</script>
</body>
</html>
